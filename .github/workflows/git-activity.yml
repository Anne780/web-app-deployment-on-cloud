name: Track Git Activity

on:
  push:

permissions:
  contents: read

jobs:
  track-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Print commit metadata
        run: |
          echo "===== COMMIT DETAILS ====="
          echo "Commit ID: $GITHUB_SHA"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Author: ${{ github.actor }}"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: ${{ github.ref_name }}"
          echo "Time: $(date)"
          echo ""

      - name: Show changed files (root repo)
        run: |
          echo "===== ROOT REPO CHANGES ====="
          git show --name-status --pretty="" $GITHUB_SHA
          echo ""

      - name: Show submodule changes
        run: |
          echo "===== SUBMODULE CHANGES ====="
          git submodule foreach '
            echo "Submodule: $name"
            git log -1 --name-status --pretty=""
            echo ""
          '

      - name: Summary
        run: |
          echo "✅ Git activity tracking completed successfully"
